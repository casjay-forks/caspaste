name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        type: string

env:
  GO_VERSION: 'stable'
  PROJECT_NAME: caspaste

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v -race -cover ./...

  build:
    name: Build Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          # FreeBSD
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          # OpenBSD
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f release.txt ]; then
            VERSION=$(cat release.txt | tr -d '[:space:]')
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "1.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT="${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          mkdir -p binaries

          go build -trimpath \
            -tags netgo \
            -ldflags "-w -s -X main.Version=${VERSION} -extldflags '-static'" \
            -o "binaries/${OUTPUT}" \
            ./src/cmd/${{ env.PROJECT_NAME }}

          chmod +x "binaries/${OUTPUT}" 2>/dev/null || true

          # Strip for Unix-like systems (not macOS or Windows)
          if [[ "${{ matrix.goos }}" =~ ^(linux|freebsd|openbsd)$ ]]; then
            strip "binaries/${OUTPUT}" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: binaries/
          retention-days: 7

  docker:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version and tags
        id: meta
        run: |
          # Get version
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f release.txt ]; then
            VERSION=$(cat release.txt | tr -d '[:space:]')
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "1.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get YYMM tag
          YYMM=$(date +%y%m)
          echo "yymm=$YYMM" >> $GITHUB_OUTPUT

          # Get short commit ID
          COMMIT_ID=$(git rev-parse --short HEAD)
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT

          # Convert repository name to lowercase for Docker
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Generate Docker tags
        id: docker_tags
        run: |
          REPO="ghcr.io/${{ steps.meta.outputs.repo_lower }}"

          # Check if this is a tag push or main branch push
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [ -n "${{ github.event.inputs.version }}" ]; then
            # Tagged release: use version, YYMM, commit, and latest tags
            TAGS="${REPO}:${{ steps.meta.outputs.version }}"
            TAGS="${TAGS},${REPO}:${{ steps.meta.outputs.yymm }}"
            TAGS="${TAGS},${REPO}:${{ steps.meta.outputs.commit_id }}"
            TAGS="${TAGS},${REPO}:latest"
          else
            # Push to main: use dev tag only
            TAGS="${REPO}:dev"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != '' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type and version
        id: release_info
        run: |
          # Check if this is a tag push or main branch push
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [ -n "${{ github.event.inputs.version }}" ]; then
            # Tagged release
            if [ -n "${{ github.event.inputs.version }}" ]; then
              VERSION="${{ github.event.inputs.version }}"
            elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#v}"
            elif [ -f release.txt ]; then
              VERSION=$(cat release.txt | tr -d '[:space:]')
            else
              VERSION="1.0.0"
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=v${VERSION}" >> $GITHUB_OUTPUT
            echo "release_name=${{ env.PROJECT_NAME }} v${VERSION}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            # Dev release (push to main)
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "tag_name=dev" >> $GITHUB_OUTPUT
            echo "release_name=${{ env.PROJECT_NAME }} dev" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true

      - name: Create source archive
        run: |
          VERSION="${{ steps.release_info.outputs.version }}"
          mkdir -p release-assets

          # Copy binaries
          cp releases/* release-assets/ 2>/dev/null || true

          # Create source archive (excludes VCS files via .gitattributes)
          git archive --format=tar.gz --prefix=${{ env.PROJECT_NAME }}-${VERSION}/ \
            -o release-assets/${{ env.PROJECT_NAME }}-${VERSION}-source.tar.gz HEAD

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.release_info.outputs.tag_name }}"
          gh release delete "${TAG_NAME}" --yes 2>/dev/null || true
          git push --delete origin "${TAG_NAME}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          prerelease: ${{ steps.release_info.outputs.is_prerelease }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
